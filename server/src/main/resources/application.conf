ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.conservatio.server.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/conservatio"
    url = ${?DATABASE_URL}
    user = "conservatio"
    user = ${?DATABASE_USER}
    password = "conservatio"
    password = ${?DATABASE_PASSWORD}
}

jwt {
    secret = "REDACTED-SET-JWT_SECRET-ENV-VAR"
    secret = ${?JWT_SECRET}
    issuer = "conservatio"
    audience = "conservatio-app"
    realm = "Conservatio"
    expiration = 86400000
}

storage {
    path = "/data/conservatio/images"
    path = ${?STORAGE_PATH}
    maxFileSize = 52428800
}
