ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.conservatio.server.ApplicationKt.module ]
    }
}

database {
    url = ${DATABASE_URL}
    user = ${DATABASE_USER}
    password = ${DATABASE_PASSWORD}
}

jwt {
    secret = ${JWT_SECRET}
    issuer = "conservatio"
    audience = "conservatio-app"
    realm = "Conservatio"
    expiration = 86400000
}

storage {
    path = "/data/conservatio/images"
    path = ${?STORAGE_PATH}
    maxFileSize = 52428800
    # Default quota per user: 2 GB (in bytes). Can override via env.
    defaultQuotaBytes = 2147483648
    defaultQuotaBytes = ${?STORAGE_DEFAULT_QUOTA_BYTES}
}
