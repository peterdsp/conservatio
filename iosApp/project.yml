name: Conservatio
options:
  bundleIdPrefix: dev.peterdsp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  Conservatio:
    type: application
    platform: iOS
    sources:
      - path: Conservatio
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: dev.peterdsp.conservatio
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "Conservatio needs camera access to photograph conservation objects and damage"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Conservatio needs photo library access to import object images"
        INFOPLIST_KEY_CFBundleDisplayName: "Conservatio"
