version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: conservatio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conservatio
      POSTGRES_USER: conservatio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-conservatio_secret}
    volumes:
      - /mnt/media/conservatio/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conservatio"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    container_name: conservatio_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/conservatio
      DATABASE_USER: conservatio
      DATABASE_PASSWORD: ${DB_PASSWORD:-conservatio_secret}
      JWT_SECRET: ${JWT_SECRET:-REDACTED-SET-JWT_SECRET-ENV-VAR}
      STORAGE_PATH: /data/images
      PORT: 8080
    volumes:
      - /mnt/media/conservatio/images:/data/images
    ports:
      - "8080:8080"

volumes:
  postgres_data:
